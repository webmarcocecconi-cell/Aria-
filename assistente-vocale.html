<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARIA — Assistente Vocale</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a; --surface: #161829; --card: #1e2035; --accent: #7c6dfa;
    --accent2: #f472b6; --accent3: #34d399; --text: #e8eaf6; --muted: #6b7280;
    --eye-white: #f0f4ff; --eye-iris: #7c6dfa; --eye-pupil: #0d0f1a;
    --border: rgba(124,109,250,0.2); --state-listening: #34d399;
    --state-thinking: #fbbf24; --state-speaking: #f472b6; --state-countdown: #7c6dfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; align-items:center; overflow:hidden; }
  .bg-aura { position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,109,250,0.12) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(244,114,182,0.10) 0%, transparent 70%); animation:aura 8s ease-in-out infinite alternate; }
  @keyframes aura { 0% { filter:hue-rotate(0deg); } 100% { filter:hue-rotate(30deg); } }
  header { position:relative; z-index:2; text-align:center; padding:28px 20px 10px; }
  header .logo { font-family:'Space Mono',monospace; font-size:2rem; font-weight:700; letter-spacing:4px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .face-container { position:relative; z-index:2; margin:20px auto; width:260px; height:300px; background:#f0ece8; border-radius:16px; border:2px solid var(--border); box-shadow:0 0 40px rgba(124,109,250,0.15); overflow:hidden; transition:all 0.4s ease; }
  .face-container.thinking { box-shadow:0 0 50px rgba(251,191,36,0.35); border-color:rgba(251,191,36,0.5); }
  .face-container.speaking { box-shadow:0 0 50px rgba(244,114,182,0.45); border-color:rgba(244,114,182,0.6); animation:pulse-face 0.6s ease-in-out infinite alternate; }
  .face-container.listening-active { box-shadow:0 0 50px rgba(52,211,153,0.5); border-color:rgba(52,211,153,0.7); }
  @keyframes pulse-face { from { transform:scale(1); } to { transform:scale(1.025); } }
  .iris { transition: transform 0.15s ease; }
  .state-label { display:inline-flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; padding:5px 14px; border-radius:20px; background:var(--card); border:1.5px solid var(--border); color:var(--muted); transition:all 0.3s; min-width:130px; justify-content:center; }
  .state-label .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background 0.3s; }
  .state-label.s-listening { border-color:var(--state-listening); color:var(--state-listening); }
  .state-label.s-listening .dot { background:var(--state-listening); }
  .state-label.s-speaking { border-color:var(--state-speaking); color:var(--state-speaking); }
  .state-label.s-speaking .dot { background:var(--state-speaking); }
  .subtitle-area { position:fixed; bottom:90px; left:0; right:0; z-index:10; display:flex; justify-content:center; padding:0 20px; pointer-events:none; }
  .subtitle-box { background:rgba(10,11,20,0.82); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:18px; padding:12px 20px; max-width:420px; width:100%; font-size:1rem; color:var(--text); text-align:center; opacity:0; transition:0.3s; }
  .subtitle-box.visible { opacity:1; }
  .input-area { position:fixed; bottom:0; left:0; right:0; z-index:20; padding:10px 16px 24px; display:flex; gap:10px; align-items:center; background:linear-gradient(to top,var(--bg) 70%,transparent); max-width:480px; margin:0 auto; }
  .btn-mic { width:48px; height:48px; border-radius:50%; border:none; background:var(--accent); color:white; cursor:pointer; font-size:1.2rem; }
  .btn-mic.recording { background:linear-gradient(135deg,#ef4444,#f97316); animation: mic-pulse 0.8s infinite alternate; }
  @keyframes mic-pulse { from { box-shadow:0 0 5px red; } to { box-shadow:0 0 20px red; } }
  .yt-player { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:25; width:min(420px,calc(100vw - 32px)); background:black; border-radius:18px; overflow:hidden; display:none; flex-direction:column; }
  .yt-player.visible { display:flex; }
</style>
<script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div class="modal-overlay" id="audioUnlockOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; display:flex; align-items:center; justify-content:center;">
  <button onclick="unlockAudio()" style="padding:20px 40px; border-radius:50px; border:none; background:var(--accent); color:white; font-weight:bold; cursor:pointer;">ATTIVA ARIA</button>
</div>

<div class="bg-aura"></div>
<header><div class="logo">ARIA</div></header>

<div class="status-area" style="text-align:center; margin-bottom:10px;">
  <div class="state-label" id="stateLabel"><span class="dot"></span><span id="stateLabelText">in attesa</span></div>
</div>

<div class="face-container" id="face">
  <svg id="ariaSvgFace" viewBox="0 0 260 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="asg" cx="50%" cy="42%" r="55%"><stop offset="0%" stop-color="#fde8d8"/><stop offset="100%" stop-color="#f5c9a8"/></radialGradient>
      <radialGradient id="aiL" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#7c6dfa"/><stop offset="100%" stop-color="#4c1d95"/></radialGradient>
    </defs>
    <path d="M40 85 Q130 55 220 85 Q235 180 130 230 Q25 180 40 85" fill="url(#asg)"/>
    <g id="svgEyeL" transform="translate(85, 125)">
       <ellipse cx="0" cy="0" rx="18" ry="22" fill="#fff"/>
       <ellipse class="iris" cx="0" cy="0" rx="11" ry="11" fill="url(#aiL)"/>
       <ellipse class="pupil" cx="0" cy="0" rx="5" ry="5" fill="#000"/>
    </g>
    <g id="svgEyeR" transform="translate(175, 125)">
       <ellipse cx="0" cy="0" rx="18" ry="22" fill="#fff"/>
       <ellipse class="iris" cx="0" cy="0" rx="11" ry="11" fill="url(#aiL)"/>
       <ellipse class="pupil" cx="0" cy="0" rx="5" ry="5" fill="#000"/>
    </g>
    <path id="svgMouth" d="M105 185 Q130 195 155 185" fill="none" stroke="#e07a8a" stroke-width="3" stroke-linecap="round"/>
  </svg>
</div>

<div class="subtitle-area">
  <div class="subtitle-box" id="subBox"></div>
</div>

<div class="yt-player" id="ytPlayer">
  <div id="ytIframeContainer"></div>
  <button onclick="closeYoutubePlayer()" style="background:red; color:white; border:none; padding:10px;">CHIUDI VIDEO</button>
</div>

<div class="input-area">
  <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
</div>

<script>
let GROQ_KEY = localStorage.getItem('groq_key') || "INSERISCI_QUI";
let YOUTUBE_KEY = localStorage.getItem('youtube_key') || "INSERISCI_QUI";
let recognition, synth = window.speechSynthesis, playerYT = null;
let isAriaSpeaking = false, conversationWindowActive = false, conversationTimeout;

function unlockAudio() {
  synth.speak(new SpeechSynthesisUtterance(""));
  document.getElementById('audioUnlockOverlay').style.display = 'none';
  initRecognition();
}

function initRecognition() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new Speech();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    document.getElementById('micBtn').classList.add('recording');
    updateLabel();
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase();
    const isVideoPlaying = playerYT && typeof playerYT.getPlayerState === 'function' && playerYT.getPlayerState() === 1;

    if (isVideoPlaying || !conversationWindowActive) {
      if (text.includes("aria") || text.includes("area")) {
        processInput(text.replace(/aria|area/g, "").trim());
      }
    } else {
      processInput(text);
    }
  };

  recognition.onend = () => {
    document.getElementById('micBtn').classList.remove('recording');
    if (!isAriaSpeaking) setTimeout(() => { try { recognition.start(); } catch(e){} }, 300);
  };
  recognition.start();
}

function updateLabel() {
  const label = document.getElementById('stateLabelText');
  if(conversationWindowActive) label.innerText = "ascolto diretto";
  else label.innerText = "attesa 'Aria'";
}

async function processInput(text) {
  if(!text) return;
  setAriaState('thinking');

  // Comandi Video
  if(playerYT && (text.includes("volume") || text.includes("pausa") || text.includes("chiudi"))) {
    if(text.includes("alza")) playerYT.setVolume(playerYT.getVolume()+20);
    else if(text.includes("abbassa")) playerYT.setVolume(playerYT.getVolume()-20);
    else if(text.includes("pausa")) playerYT.pauseVideo();
    else if(text.includes("chiudi")) closeYoutubePlayer();
    speak("Eseguito."); return;
  }

  // AI Response
  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "llama-3.1-70b-versatile",
        messages: [{role:"system", content: "Sei ARIA. Rispondi breve."}, {role:"user", content: text}]
      })
    });
    const data = await response.json();
    speak(data.choices[0].message.content);
  } catch(e) { speak("Errore di connessione."); }
}

function speak(text) {
  isAriaSpeaking = true;
  recognition.stop();
  clearTimeout(conversationTimeout);
  conversationWindowActive = true;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.onstart = () => { setAriaState('speaking'); showSubtitle(text); };
  utterance.onend = () => {
    isAriaSpeaking = false;
    setAriaState('idle');
    conversationTimeout = setTimeout(() => { conversationWindowActive = false; updateLabel(); }, 10000);
  };
  synth.speak(utterance);
}

function setAriaState(state) {
  const face = document.getElementById('face');
  face.className = 'face-container ' + state;
  if(state === 'idle') openSvgEyes();
}

function showSubtitle(t) {
  const s = document.getElementById('subBox');
  s.innerText = t; s.classList.add('visible');
  setTimeout(() => s.classList.remove('visible'), 5000);
}

function openSvgEyes(){ document.querySelectorAll('ellipse[ry="22"]').forEach(e => e.style.transform = "scaleY(1)"); }

function closeYoutubePlayer() {
  document.getElementById('ytPlayer').classList.remove('visible');
  if(playerYT) playerYT.stopVideo();
  conversationWindowActive = false;
}
</script>
</body>
</html>
