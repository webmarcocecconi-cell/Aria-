<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARIA — Assistente Vocale Gratuito</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a; --surface: #161829; --card: #1e2035; --accent: #7c6dfa;
    --accent2: #f472b6; --accent3: #34d399; --text: #e8eaf6; --muted: #6b7280;
    --eye-white: #f0f4ff; --border: rgba(124,109,250,0.2);
    --state-listening: #34d399; --state-thinking: #fbbf24; --state-speaking: #f472b6;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif;
    margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }
  .app-container { max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
  
  /* AVATAR */
  .avatar-container { display: flex; justify-content: center; padding: 20px 0; }
  .svg-aria { width: 150px; height: 150px; }
  
  /* CONFIGURATION AREA */
  .config-section {
    background: var(--surface); border: 1px solid var(--border);
    padding: 15px; border-radius: 20px; text-align: center;
  }
  .config-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; color: var(--muted); text-transform: uppercase; }
  .api-input-group { display: flex; gap: 8px; }
  input[type="password"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; color: var(--accent3); outline: none; font-family: monospace;
  }
  .btn-save {
    background: var(--accent3); color: #0d0f1a; border: none; padding: 0 20px;
    border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
  }
  .btn-save:hover { transform: scale(1.05); background: #2bd089; }

  /* CHAT */
  .chat-box {
    background: var(--surface); border-radius: 24px; padding: 20px;
    height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    border: 1px solid var(--border);
  }
  .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; }
  .msg-user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg-aria { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  /* INPUT CONTROLS */
  .controls { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 15px; padding: 15px; color: white; outline: none;
  }
  .btn-circle {
    width: 50px; height: 50px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  }
  .btn-send { background: var(--accent); color: white; }
  .btn-mic { background: var(--accent2); color: white; }

  .status-label { text-align: center; font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: -10px; }
</style>
</head>
<body>

<div class="app-container">
  <div class="avatar-container">
    <svg class="svg-aria" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="var(--border)" stroke-width="0.5"/>
      <g id="eyes">
        <ellipse id="eyeL" cx="35" cy="45" rx="8" ry="8" fill="var(--eye-white)"/>
        <ellipse id="eyeR" cx="65" cy="45" rx="8" ry="8" fill="var(--eye-white)"/>
      </g>
      <path id="mouth" d="M 40 65 Q 50 65 60 65" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="status" class="status-label">SISTEMA PRONTO</div>

  <!-- SEZIONE API KEY CORRETTA CON TASTO SALVA -->
  <div class="config-section">
    <div class="config-title">Configurazione API Key Gemini</div>
    <div class="api-input-group">
      <input type="password" id="apiKeyInput" placeholder="Incolla qui la chiave API...">
      <button class="btn-save" onclick="saveApiKey()">SALVA</button>
    </div>
    <p id="saveMsg" style="color: var(--accent3); font-size: 0.7rem; margin-top: 8px; display: none;">✓ Chiave salvata correttamente!</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg msg-aria">Ciao! Sono ARIA. Inserisci la tua API Key sopra, clicca SALVA e iniziamo.</div>
  </div>

  <div class="controls">
    <input type="text" id="userInput" placeholder="Scrivi un messaggio...">
    <button class="btn-circle btn-send" onclick="handleMessage()">&#10148;</button>
    <button class="btn-circle btn-mic" onclick="startVoice()">🎤</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const statusLabel = document.getElementById('status');

  // Carica la chiave se già salvata
  window.onload = () => {
    const saved = localStorage.getItem('aria_gemini_key');
    if (saved) {
      apiKeyInput.value = saved;
      document.getElementById('saveMsg').style.display = 'block';
    }
  };

  // FUNZIONE PER SALVARE LA CHIAVE (QUANDO CLICCHI IL TASTO)
  function saveApiKey() {
    const key = apiKeyInput.value.trim();
    if (key) {
      localStorage.setItem('aria_gemini_key', key);
      const msg = document.getElementById('saveMsg');
      msg.style.display = 'block';
      msg.textContent = "✓ Chiave salvata correttamente!";
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
    } else {
      alert("Inserisci una chiave valida prima di salvare.");
    }
  }

  // --- LOGICA AI (GEMINI FLASH FREE) ---
  async function callGemini(text) {
    const key = localStorage.getItem('aria_gemini_key');
    if (!key) {
      addMessage('aria', "Per favore, inserisci la chiave API e clicca SALVA prima di parlare.");
      return;
    }

    updateState('thinking');

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Rispondi in modo breve e amichevole in italiano: " + text }] }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const reply = data.candidates[0].content.parts[0].text;
      addMessage('aria', reply);
      speak(reply);
    } catch (err) {
      addMessage('aria', "Errore: la chiave non è valida o i limiti sono superati.");
      updateState('idle');
    }
  }

  // --- VOCE (SPEECH API) ---
  function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'it-IT';
    u.onstart = () => updateState('speaking');
    u.onend = () => updateState('idle');
    window.speechSynthesis.speak(u);
  }

  function startVoice() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'it-IT';
    rec.onstart = () => updateState('listening');
    rec.onresult = (e) => {
      const t = e.results[0][0].transcript;
      addMessage('user', t);
      callGemini(t);
    };
    rec.onerror = () => updateState('idle');
    rec.start();
  }

  // --- UTILITY ---
  function handleMessage() {
    const input = document.getElementById('userInput');
    const val = input.value.trim();
    if (val) {
      addMessage('user', val);
      callGemini(val);
      input.value = '';
    }
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function updateState(state) {
    const mouth = document.getElementById('mouth');
    const eyeL = document.getElementById('eyeL');
    const eyeR = document.getElementById('eyeR');

    if (state === 'thinking') {
      statusLabel.textContent = "ARIA STA RIFLETTENDO...";
      statusLabel.style.color = "var(--state-thinking)";
      eyeL.style.fill = eyeR.style.fill = "var(--state-thinking)";
    } else if (state === 'listening') {
      statusLabel.textContent = "ARIA TI ASCOLTA...";
      statusLabel.style.color = "var(--state-listening)";
      mouth.setAttribute('d', 'M 45 65 L 55 65'); 
    } else if (state === 'speaking') {
      statusLabel.textContent = "ARIA STA PARLANDO...";
      statusLabel.style.color = "var(--state-speaking)";
      mouth.setAttribute('d', 'M 40 65 Q 50 75 60 65');
    } else {
      statusLabel.textContent = "ARIA PRONTA";
      statusLabel.style.color = "var(--muted)";
      eyeL.style.fill = eyeR.style.fill = "white";
      mouth.setAttribute('d', 'M 40 65 Q 50 65 60 65');
    }
  }
</script>
</body>
</html>
