<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARIA — Assistente Vocale</title>
<style>
  :root {
    --bg: #0d0f1a; --surface: #161829; --card: #1e2035; --accent: #7c6dfa;
    --accent2: #f472b6; --accent3: #34d399; --text: #e8eaf6; --muted: #6b7280;
    --border: rgba(124,109,250,0.2);
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif;
    margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .app-container { max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
  
  .chat-box {
    background: var(--surface); border-radius: 20px; padding: 20px;
    height: 300px; overflow-y: auto; border: 1px solid var(--border);
  }
  .msg { padding: 10px; border-radius: 10px; margin-bottom: 10px; max-width: 85%; }
  .msg-user { background: var(--accent); align-self: flex-end; margin-left: auto; }
  .msg-aria { background: var(--card); border: 1px solid var(--border); }

  .controls { display: flex; gap: 8px; }
  input[type="text"], input[type="password"] {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; color: white; outline: none;
  }

  .btn {
    padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    font-weight: bold; transition: 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-save { background: var(--accent3); color: #000; }
  .btn-mic { background: var(--accent2); color: white; }

  .settings {
    background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
    border: 1px dashed var(--muted); margin-top: 10px;
  }
  .success-flash { color: var(--accent3); font-size: 0.8rem; margin-top: 5px; display: none; }
</style>
</head>
<body>

<div class="app-container">
  <h2>ARIA Assistente</h2>

  <div class="settings">
    <strong>1. Configura la tua chiave</strong>
    <div style="display: flex; gap: 5px; margin-top: 8px;">
      <input type="password" id="geminiKey" placeholder="Incolla qui la chiave API...">
      <button class="btn btn-save" onclick="saveKey()">SALVA</button>
    </div>
    <div id="saveConfirm" class="success-flash">✓ Chiave salvata nel browser!</div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg msg-aria">Ciao! Incolla la chiave sopra, clicca SALVA e poi scrivimi qualcosa o usa il microfono.</div>
  </div>

  <div class="controls">
    <input type="text" id="textInput" placeholder="Chiedimi qualcosa...">
    <button class="btn btn-primary" onclick="handleSend()">Invia</button>
    <button class="btn btn-mic" onclick="toggleMic()">🎤</button>
  </div>
</div>

<script>
  // Carica la chiave salvata all'avvio
  window.onload = () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if (savedKey) {
      document.getElementById('geminiKey').value = savedKey;
      document.getElementById('saveConfirm').style.display = 'block';
    }
  };

  function saveKey() {
    const key = document.getElementById('geminiKey').value.trim();
    if (key) {
      localStorage.setItem('gemini_api_key', key);
      const feedback = document.getElementById('saveConfirm');
      feedback.style.display = 'block';
      setTimeout(() => { feedback.style.display = 'none'; }, 3000);
    } else {
      alert("Inserisci una chiave valida");
    }
  }

  async function askGemini(query) {
    const key = localStorage.getItem('gemini_api_key');
    if (!key) {
      addMessage('aria', "Errore: Devi prima inserire la chiave e cliccare su SALVA.");
      return;
    }

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: query }] }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const aiText = data.candidates[0].content.parts[0].text;
      addMessage('aria', aiText);
      speak(aiText);
    } catch (e) {
      addMessage('aria', "Errore: La chiave non sembra valida o è scaduta. Rigenerala su AI Studio.");
    }
  }

  // --- Funzioni di supporto ---
  function handleSend() {
    const input = document.getElementById('textInput');
    if (input.value.trim()) {
      addMessage('user', input.value);
      askGemini(input.value);
      input.value = '';
    }
  }

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = `msg msg-${sender}`;
    div.textContent = text;
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = chatBox.scrollHeight;
  }

  function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'it-IT';
    window.speechSynthesis.speak(u);
  }

  function toggleMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Microfono non supportato");
    const rec = new SpeechRecognition();
    rec.lang = 'it-IT';
    rec.onresult = (e) => {
      const t = e.results[0][0].transcript;
      addMessage('user', t);
      askGemini(t);
    };
    rec.start();
  }
</script>

</body>
</html>
