<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Conversazione Naturale</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        #app { text-align: center; width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        #aria-btn { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 50px; color: white; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); margin: 20px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; transform: scale(1.1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
        #transcript { margin-top: 20px; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); min-height: 60px; line-height: 1.4; font-size: 1.1rem; }
        .api-input { background: var(--card); border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aria</h1>
        <input type="password" id="apiKey" class="api-input" placeholder="Incolla chiave Groq...">
        <button onclick="saveAndStart()" style="padding: 10px 20px; border-radius: 10px; border: none; background: var(--accent); color: white; cursor: pointer;">Inizia</button>
    </div>

    <div id="app" class="hidden">
        <div id="avatar" style="font-size: 80px;">✨</div>
        <p id="status" style="color: var(--accent); font-weight: bold;">Tocca per parlare</p>
        <button id="aria-btn">🎙️</button>
        <div id="transcript">Ciao! Sono qui se ti va di fare due chiacchiere.</div>
    </div>

    <script>
        const systemPrompt = "Sei Aria, un'amica vera. Parla in modo molto colloquiale e sintetico. Usa frasi brevi. Non essere mai formale. Se l'utente sta male, sii empatica. Se è felice, festeggia con lui. NON menzionare compiti o studio a meno che non lo faccia l'utente. Rispondi come se fossi in una nota vocale su WhatsApp: amichevole, calda e diretta.";

        function saveAndStart() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Inserisci la chiave!");
            localStorage.setItem('aria_key', key);
            init();
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            window.speechSynthesis.getVoices();
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            document.getElementById('aria-btn').onclick = () => {
                window.speechSynthesis.cancel();
                rec.start();
                document.getElementById('aria-btn').classList.add('listening');
            };
            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                askGroq(e.results[0][0].transcript);
            };
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            // Aggiungiamo delle virgole per creare pause naturali nel parlato
            const naturalText = text.replace(/([.!?])\s+/g, "$1, ");
            const utter = new SpeechSynthesisUtterance(naturalText);
            
            const voices = synth.getVoices();
            const bestVoice = voices.find(v => v.lang.startsWith('it') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('it'));
            
            if (bestVoice) utter.voice = bestVoice;
            utter.lang = 'it-IT';
            utter.pitch = 1.0; 
            utter.rate = 1.0; // Velocità standard per evitare l'effetto trascinato
            
            synth.speak(utter);
        }

        async function askGroq(input) {
            document.getElementById('transcript').innerText = "Tu: " + input;
            document.getElementById('status').innerText = "Aria sta pensando...";
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + localStorage.getItem('aria_key'), "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: input }],
                        temperature: 0.9
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                document.getElementById('transcript').innerText = "Aria: " + reply;
                document.getElementById('status').innerText = "Tocca per rispondere";
                speak(reply);
            } catch(e) { document.getElementById('status').innerText = "Errore!"; }
        }

        if(localStorage.getItem('aria_key')) init();
    </script>
</body>
</html>
