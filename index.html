<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Gemini Real Voice</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #app { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        #aria-btn { width: 140px; height: 140px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 60px; color: white; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); margin: 30px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #transcript { background: var(--card); padding: 25px; border-radius: 20px; min-height: 50px; font-size: 1.1rem; border-bottom: 4px solid var(--accent); line-height: 1.5; }
        .api-input { background: var(--card); border: 2px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aria ✨</h1>
        <p>Configurazione Gemini 2.5 TTS</p>
        <input type="password" id="geminiKey" class="api-input" placeholder="Incolla la tua API Key">
        <button onclick="saveAndStart()" style="background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold;">ATTIVA ARIA</button>
    </div>

    <div id="app" class="hidden">
        <div style="font-size: 80px; margin-bottom: 10px;">✨</div>
        <p id="status">Tocca per parlare</p>
        <button id="aria-btn">🎙️</button>
        <div id="transcript">Pronta! (Nota: questo modello mostra solo l'audio)</div>
    </div>

    <script>
        const systemPrompt = "Sei Aria, un'amica empatica. Rispondi in modo solare e breve.";

        function saveAndStart() {
            const key = document.getElementById('geminiKey').value.trim();
            if(key) { localStorage.setItem('gemini_key', key); init(); }
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            document.getElementById('aria-btn').onclick = () => { rec.start(); document.getElementById('aria-btn').classList.add('listening'); };
            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                askGemini(e.results[0][0].transcript);
            };
        }

        async function askGemini(input) {
            document.getElementById('transcript').innerHTML = `<em>Tu: ${input}</em>`;
            const apiKey = localStorage.getItem('gemini_key');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\n\n" + input }] }],
                        generationConfig: {
                            // CORREZIONE: Chiediamo SOLO l'audio come richiesto dal modello
                            response_modalities: ["AUDIO"], 
                            speech_config: { voice_config: { prebuilt_voice_config: { voice_name: "Aoede" } } }
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                // Cerchiamo solo la parte audio nei risultati
                const audioPart = data.candidates[0].content.parts.find(p => p.inline_data);
                if (audioPart) {
                    playAudio(audioPart.inline_data.data);
                    document.getElementById('transcript').innerHTML += `<br><br>🔊 <em>Aria sta parlando...</em>`;
                }

            } catch(e) { alert("Errore: " + e.message); }
        }

        function playAudio(base64) {
            const bin = atob(base64);
            const array = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) array[i] = bin.charCodeAt(i);
            const blob = new Blob([array], {type: 'audio/wav'});
            new Audio(URL.createObjectURL(blob)).play();
        }

        if(localStorage.getItem('gemini_key')) init();
    </script>
</body>
</html>
