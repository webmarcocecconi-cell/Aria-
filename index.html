<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Voce e Testo</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #app { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        #aria-btn { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 50px; color: white; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); margin: 20px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #transcript-container { background: var(--card); padding: 20px; border-radius: 15px; min-height: 100px; border-bottom: 4px solid var(--accent); text-align: left; }
        .label { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        #status { margin-top: 10px; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aria ✨</h1>
        <p>Modalità Testo + Voce (Gemini 2.0)</p>
        <input type="password" id="geminiKey" style="padding: 12px; border-radius: 10px; border: none; width: 80%; margin-bottom: 15px;" placeholder="Incolla la tua API Key">
        <button onclick="saveAndStart()" style="background: var(--accent); border: none; padding: 15px 35px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; width: 85%;">INIZIA</button>
    </div>

    <div id="app" class="hidden">
        <div id="transcript-container">
            <div class="label">Aria dice:</div>
            <div id="aria-text">Ciao! Prova a parlarmi, ti risponderò scrivendo e parlando.</div>
            <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
            <div class="label">Tu hai detto:</div>
            <div id="user-text" style="opacity: 0.7;">...</div>
        </div>
        <button id="aria-btn">🎙️</button>
        <div id="status">Tocca per parlare</div>
    </div>

    <audio id="player" style="display:none;"></audio>

    <script>
        const systemPrompt = "Sei Aria, un'amica solare. Rispondi in italiano. Sii naturale e breve (massimo 2 frasi). Fornisci sia il testo che l'audio della risposta.";
        const player = document.getElementById('player');

        function saveAndStart() {
            const key = document.getElementById('geminiKey').value.trim();
            if(key) { 
                localStorage.setItem('gemini_key', key); 
                player.play().catch(() => {}); // Sblocca audio
                init(); 
            }
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            
            document.getElementById('aria-btn').onclick = () => { 
                rec.start(); 
                document.getElementById('aria-btn').classList.add('listening');
                document.getElementById('status').innerText = "Ti ascolto...";
            };

            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                const t = e.results[0][0].transcript;
                document.getElementById('user-text').innerText = t;
                document.getElementById('status').innerText = "Aria sta scrivendo e parlando...";
                callGemini(t);
            };
        }

        async function callGemini(input) {
            const key = localStorage.getItem('gemini_key');
            try {
                // Usiamo gemini-2.0-flash che supporta TEXT + AUDIO insieme
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\n\nUtente: " + input }] }],
                        generationConfig: {
                            // Qui chiediamo esplicitamente ENTRAMBE le cose
                            response_modalities: ["TEXT", "AUDIO"], 
                            speech_config: { voice_config: { prebuilt_voice_config: { voice_name: "Aoede" } } }
                        }
                    })
                });

                const res = await response.json();
                if(res.error) throw new Error(res.error.message);

                // Estraiamo il testo
                const textPart = res.candidates[0].content.parts.find(p => p.text);
                if (textPart) {
                    document.getElementById('aria-text').innerText = textPart.text;
                }

                // Estraiamo l'audio
                const audioPart = res.candidates[0].content.parts.find(p => p.inline_data);
                if (audioPart) {
                    playAudio(audioPart.inline_data.data);
                }

            } catch(e) { 
                document.getElementById('status').innerText = "Errore: " + e.message;
            }
        }

        function playAudio(b64) {
            const bin = atob(b64);
            const buf = new Uint8Array(bin.length);
            for(let i=0; i<bin.length; i++) buf[i] = bin.charCodeAt(i);
            const url = URL.createObjectURL(new Blob([buf], {type: 'audio/wav'}));
            player.src = url;
            player.play();
            player.onended = () => document.getElementById('status').innerText = "Tocca per parlare ancora";
        }

        if(localStorage.getItem('gemini_key')) init();
    </script>
</body>
</html>
