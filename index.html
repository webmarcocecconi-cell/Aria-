<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Solo Voce</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #app { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        #aria-btn { width: 140px; height: 140px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 60px; color: white; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); margin: 30px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { background: var(--card); padding: 20px; border-radius: 15px; min-height: 40px; border-bottom: 3px solid var(--accent); }
        .api-input { background: var(--card); border: 2px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aria ✨</h1>
        <p>Modello: Gemini 2.5 TTS (Solo Audio)</p>
        <input type="password" id="geminiKey" class="api-input" placeholder="Incolla la tua API Key">
        <button onclick="saveAndStart()" style="background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold;">ATTIVA</button>
    </div>

    <div id="app" class="hidden">
        <div style="font-size: 60px;">🎙️</div>
        <div id="status">Tocca il cerchio e parla</div>
        <button id="aria-btn">🔵</button>
        <p style="font-size: 0.8rem; opacity: 0.5;">Nota: Questo modello risponde solo a voce.</p>
    </div>

    <script>
        const systemPrompt = "Sei Aria, un'amica empatica. Rispondi in modo solare, dolce e molto breve (max 2 frasi). Parla in italiano.";

        function saveAndStart() {
            const key = document.getElementById('geminiKey').value.trim();
            if(key) { localStorage.setItem('gemini_key', key); init(); }
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            
            document.getElementById('aria-btn').onclick = () => { 
                try { 
                    rec.start(); 
                    document.getElementById('aria-btn').classList.add('listening');
                    document.getElementById('status').innerText = "Ti ascolto...";
                } catch(e) {}
            };

            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                const text = e.results[0][0].transcript;
                document.getElementById('status').innerText = "Aria sta preparando la voce...";
                askGemini(text);
            };
        }

        async function askGemini(input) {
            const apiKey = localStorage.getItem('gemini_key');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\n\nUtente: " + input }] }],
                        generationConfig: {
                            // RICHIESTA SOLO AUDIO PER EVITARE ERRORE 400
                            response_modalities: ["AUDIO"], 
                            speech_config: { voice_config: { prebuilt_voice_config: { voice_name: "Aoede" } } }
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const audioPart = data.candidates[0].content.parts.find(p => p.inline_data);
                if (audioPart) {
                    playAudio(audioPart.inline_data.data);
                    document.getElementById('status').innerText = "Aria sta parlando...";
                }

            } catch(e) { 
                alert("Errore: " + e.message);
                document.getElementById('status').innerText = "Errore tecnico.";
            }
        }

        function playAudio(base64) {
            const bin = atob(base64);
            const array = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) array[i] = bin.charCodeAt(i);
            const blob = new Blob([array], {type: 'audio/wav'});
            const audio = new Audio(URL.createObjectURL(blob));
            audio.onended = () => { document.getElementById('status').innerText = "Tocca per parlare ancora"; };
            audio.play();
        }

        if(localStorage.getItem('gemini_key')) init();
    </script>
</body>
</html>
