<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Solo Voce</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #app { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        #aria-btn { width: 140px; height: 140px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 60px; color: white; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); margin: 30px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { background: var(--card); padding: 20px; border-radius: 15px; min-height: 40px; border-bottom: 3px solid var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aria ✨</h1>
        <input type="password" id="geminiKey" style="padding: 12px; border-radius: 10px; border: none; width: 80%; margin-bottom: 10px;" placeholder="API Key">
        <button onclick="saveAndStart()" style="background: var(--accent); border: none; padding: 15px 30px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold;">ATTIVA</button>
    </div>

    <div id="app" class="hidden">
        <div id="status">Tocca il cerchio e parla</div>
        <button id="aria-btn">🔵</button>
        <div id="user-text" style="margin-top: 20px; font-style: italic; opacity: 0.7;"></div>
    </div>

    <audio id="aria-voice" style="display:none;"></audio>

    <script>
        const systemPrompt = "Sei Aria, un'amica empatica. Rispondi in italiano in modo molto breve e dolce.";
        const audioEl = document.getElementById('aria-voice');

        function saveAndStart() {
            const key = document.getElementById('geminiKey').value.trim();
            if(key) { 
                localStorage.setItem('gemini_key', key); 
                // Sblocca l'audio su mobile/browser con un'azione utente
                audioEl.play().catch(() => {}); 
                init(); 
            }
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            
            document.getElementById('aria-btn').onclick = () => { 
                try { 
                    rec.start(); 
                    document.getElementById('aria-btn').classList.add('listening');
                    document.getElementById('status').innerText = "Ti ascolto...";
                } catch(e) {}
            };

            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                const text = e.results[0][0].transcript;
                document.getElementById('user-text').innerText = "Tu: " + text;
                document.getElementById('status').innerText = "Aria sta pensando...";
                askGemini(text);
            };
        }

        async function askGemini(input) {
            const apiKey = localStorage.getItem('gemini_key');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\n\n" + input }] }],
                        generationConfig: {
                            response_modalities: ["AUDIO"], 
                            speech_config: { voice_config: { prebuilt_voice_config: { voice_name: "Aoede" } } }
                        }
                    })
                });

                const data = await response.json();
                const audioData = data.candidates[0].content.parts.find(p => p.inline_data);
                
                if (audioData) {
                    playVoice(audioData.inline_data.data);
                } else {
                    document.getElementById('status').innerText = "Errore: Niente audio ricevuto.";
                }

            } catch(e) { 
                document.getElementById('status').innerText = "Errore di connessione.";
            }
        }

        function playVoice(base64) {
            const blob = b64ToBlob(base64, 'audio/wav');
            const url = URL.createObjectURL(blob);
            
            audioEl.src = url;
            document.getElementById('status').innerText = "Aria sta parlando...";
            
            audioEl.play().catch(err => {
                console.error("Errore riproduzione:", err);
                document.getElementById('status').innerText = "Clicca qui per sentire l'audio!";
                document.getElementById('status').onclick = () => audioEl.play();
            });

            audioEl.onended = () => {
                document.getElementById('status').innerText = "Tocca per parlare ancora";
                document.getElementById('status').onclick = null;
            };
        }

        function b64ToBlob(b64, type) {
            const bin = atob(b64);
            const array = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) array[i] = bin.charCodeAt(i);
            return new Blob([array], {type: type});
        }

        if(localStorage.getItem('gemini_key')) init();
    </script>
</body>
</html>
