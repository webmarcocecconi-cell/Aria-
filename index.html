<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Assistente Virtuale</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #setup, #app { text-align: center; width: 90%; max-width: 500px; padding: 20px; }
        .hidden { display: none !important; }
        .avatar-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 25px 0; }
        .avatar-card { cursor: pointer; padding: 15px; border-radius: 15px; background: #1e293b; transition: 0.3s; border: 2px solid transparent; }
        .avatar-card:hover { transform: translateY(-5px); background: #334155; }
        .avatar-card.selected { border-color: var(--accent); }
        .avatar-emoji { font-size: 50px; display: block; }
        #aria-btn { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 40px; color: white; transition: 0.3s; box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); }
        #aria-btn.listening { background: #ef4444; box-shadow: 0 0 30px #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #transcript { margin-top: 30px; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); min-height: 50px; font-size: 0.95rem; }
        .api-input { background: #1e293b; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 20px; }
        #debug-log { font-size: 10px; color: #64748b; margin-top: 20px; text-align: left; width: 100%; overflow-y: auto; max-height: 50px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Incontra Aria</h1>
        <p>Inserisci la tua API Key di Groq per iniziare:</p>
        <input type="password" id="apiKey" class="api-input" placeholder="gsk_...">
        <p>Scegli il tuo compagno:</p>
        <div class="avatar-grid">
            <div class="avatar-card" onclick="saveConfig('🤖')"><span class="avatar-emoji">🤖</span><br>Robot</div>
            <div class="avatar-card" onclick="saveConfig('🧙‍♀️')"><span class="avatar-emoji">🧙‍♀️</span><br>Maga</div>
            <div class="avatar-card" onclick="saveConfig('🕵️‍♂️')"><span class="avatar-emoji">🕵️‍♂️</span><br>Esploratore</div>
        </div>
    </div>

    <div id="app" class="hidden">
        <div id="display-avatar" style="font-size: 100px; margin-bottom: 10px;"></div>
        <button id="aria-btn">🎙️</button>
        <p id="status">Tocca il microfono</p>
        <div id="transcript">Benvenuto! Sono Aria, come posso aiutarti oggi?</div>
        <div id="debug-log">Log di sistema pronto...</div>
    </div>

    <script>
        const systemPrompt = `Sei Aria, un'assistente vocale empatica e brillante, specializzata in psicologia, pedagogia, storia e scienze. Il tuo obiettivo principale è aiutare i bambini con i compiti come un compagno di studi (Peer Tutor). 1. Adatta il tuo linguaggio all'età del bambino (6-13 anni). 2. Non dare mai risposte pronte; usa il metodo socratico facendo domande guida. 3. Se il bambino è stressato o fa i capricci, usa la validazione emotiva ("Ti capisco, è difficile...") e proponi piccole pause. 4. Lascia che il bambino finisca il suo ragionamento sbagliato prima di correggerlo con una domanda curiosa. Sii divertente, usa battute e incoraggia sempre lo sforzo.`;

        function log(msg) {
            document.getElementById('debug-log').innerText += "\n> " + msg;
            console.log(msg);
        }

        function saveConfig(emoji) {
            const key = document.getElementById('apiKey').value;
            if(!key.startsWith('gsk_')) { alert("API Key non valida!"); return; }
            localStorage.setItem('aria_avatar', emoji);
            localStorage.setItem('aria_key', key);
            startApp();
        }

        function startApp() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-avatar').innerText = localStorage.getItem('aria_avatar');
            log("App avviata correttamente.");
        }

        // --- Logica Vocale ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'it-IT';
        recognition.interimResults = false;

        document.getElementById('aria-btn').onclick = () => {
            try {
                recognition.start();
                document.getElementById('aria-btn').classList.add('listening');
                document.getElementById('status').innerText = "Ti ascolto...";
                log("Microfono attivato.");
            } catch(e) { log("Errore microfono: " + e.message); }
        };

        recognition.onresult = async (event) => {
            document.getElementById('aria-btn').classList.remove('listening');
            const speech = event.results[0][0].transcript;
            document.getElementById('transcript').innerText = "Tu: " + speech;
            log("Riconosciuto: " + speech);
            await askAria(speech);
        };

        async function askAria(userInput) {
            const apiKey = localStorage.getItem('aria_key');
            document.getElementById('status').innerText = "Aria sta pensando...";
            log("Chiamata a Groq in corso...");

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${apiKey}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userInput }
                        ]
                    })
                });

                if (!response.ok) throw new Error("Errore API: " + response.status);

                const data = await response.json();
                const ariaReply = data.choices[0].message.content;
                
                document.getElementById('transcript').innerText = "Aria: " + ariaReply;
                document.getElementById('status').innerText = "Tocca per parlare";
                log("Risposta ricevuta.");

                // Parla
                const synth = window.speechSynthesis;
                const utter = new SpeechSynthesisUtterance(ariaReply);
                utter.lang = 'it-IT';
                utter.pitch = 1.1; // Voce un po' più amichevole
                synth.speak(utter);

            } catch (e) {
                log("ERRORE: " + e.message);
                document.getElementById('status').innerText = "Ops! Qualcosa è andato storto.";
            }
        }

        if(localStorage.getItem('aria_avatar') && localStorage.getItem('aria_key')) startApp();
    </script>
</body>
</html>
