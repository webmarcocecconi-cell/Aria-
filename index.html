<!DOCTYPE html><html lang="it"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Gemini Real Voice</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #app { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        #aria-btn { width: 140px; height: 140px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 60px; color: white; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); margin: 30px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #transcript { background: var(--card); padding: 25px; border-radius: 20px; min-height: 50px; font-size: 1.1rem; border-bottom: 4px solid var(--accent); line-height: 1.5; }
        .api-input { background: var(--card); border: 2px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style></head><body>

    <div id="setup">
        <h1>Aria: Voce Reale ✨</h1>
        <p>Configurazione Gemini AI</p>
        <input type="password" id="geminiKey" class="api-input" placeholder="Incolla Gemini API Key">
        <button onclick="saveAndStart()" style="background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold;">ATTIVA ARIA</button>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 20px;">Usa il modello Gemini 1.5 Flash (Gratuito)</p>
    </div>

    <div id="app" class="hidden">
        <div style="font-size: 80px; margin-bottom: 10px;">✨</div>
        <p id="status">Tocca per parlare con Aria</p>
        <button id="aria-btn">🎙️</button>
        <div id="transcript">Ciao! Sono Aria. Adesso posso parlarti con la mia vera voce. Prova a chiedermi qualcosa!</div>
    </div>

    <script>
        // Prompt per definire la personalità di Aria
        const systemPrompt = "Sei Aria, un'amica empatica, solare e calda. Parla in modo naturale, come in una chiacchierata tra amici. Usa frasi brevi (max 2). Sii dolce e incoraggiante. Rispondi sempre in italiano.";

        function saveAndStart() {
            const key = document.getElementById('geminiKey').value.trim();
            if(key) {
                localStorage.setItem('gemini_key', key);
                init();
            } else { alert("Inserisci una chiave valida!"); }
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        // --- ASCOLTO (Web Speech API) ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';

            document.getElementById('aria-btn').onclick = () => { 
                try {
                    rec.start(); 
                    document.getElementById('aria-btn').classList.add('listening');
                    document.getElementById('status').innerText = "Ti sto ascoltando...";
                } catch(e) { console.log("Già in ascolto"); }
            };

            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('aria-btn').classList.remove('listening');
                document.getElementById('status').classList.add('loading-dots');
                document.getElementById('status').innerText = "Aria sta pensando";
                askGemini(text);
            };
        }

        // --- CERVELLO E VOCE (Gemini Multimodal API) ---
        async function askGemini(input) {
            document.getElementById('transcript').innerHTML = `<em>Tu: ${input}</em>`;
            const apiKey = localStorage.getItem('gemini_key');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${systemPrompt}\n\nUtente: ${input}` }] }],
                        generationConfig: {
                            // Chiediamo a Gemini di rispondere ANCHE con audio
                            response_modalities: ["TEXT", "AUDIO"],
                            speech_config: {
                                voice_config: {
                                    prebuilt_voice_config: { 
                                        voice_name: "Puck" // Puck è una voce femminile, giovane e amichevole
                                    }
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                
                // Estraiamo il testo e l'audio dalla risposta
                const textReply = data.candidates[0].content.parts.find(p => p.text).text;
                const audioData = data.candidates[0].content.parts.find(p => p.inline_data).inline_data.data;

                // Aggiorniamo l'interfaccia
                document.getElementById('status').classList.remove('loading-dots');
                document.getElementById('status').innerText = "In riproduzione...";
                document.getElementById('transcript').innerText = textReply;

                // Riproduciamo l'audio
                playAudio(audioData);

            } catch(e) { 
                console.error(e);
                document.getElementById('status').innerText = "Errore! Riprova.";
                alert("Errore durante la chiamata a Gemini. Controlla la tua API Key o la connessione."); 
            }
        }

        function playAudio(base64) {
            const audioBlob = b64ToBlob(base64, 'audio/wav');
            const url = URL.createObjectURL(audioBlob);
            const audio = new Audio(url);
            audio.onended = () => { document.getElementById('status').innerText = "Tocca per parlare di nuovo"; };
            audio.play();
        }

        function b64ToBlob(b64Data, contentType) {
            const byteCharacters = atob(b64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], {type: contentType});
        }

        if(localStorage.getItem('gemini_key')) init();
    </script>
</body></html>
