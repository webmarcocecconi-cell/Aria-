<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Assistente Vocale</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #setup, #app { text-align: center; width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        .avatar-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 25px 0; }
        .avatar-card { cursor: pointer; padding: 20px; border-radius: 20px; background: var(--card); transition: 0.3s; border: 2px solid transparent; }
        .avatar-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .avatar-emoji { font-size: 50px; display: block; }
        #aria-btn { width: 130px; height: 130px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 50px; color: white; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); margin: 20px 0; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .api-input { background: var(--card); border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 20px; }
        #transcript { margin-top: 20px; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); min-height: 80px; text-align: left; line-height: 1.5; }
        #debug-log { font-family: monospace; font-size: 11px; color: #94a3b8; margin-top: 30px; text-align: left; width: 100%; max-height: 120px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .error-msg { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Ciao, sono Aria</h1>
        <p>Incolla la tua chiave Groq e scegli un avatar:</p>
        <input type="password" id="apiKey" class="api-input" placeholder="gsk_...">
        <div class="avatar-grid">
            <div class="avatar-card" onclick="saveAndStart('🤖')"><span class="avatar-emoji">🤖</span>Robot</div>
            <div class="avatar-card" onclick="saveAndStart('🧙‍♀️')"><span class="avatar-emoji">🧙‍♀️</span>Maga</div>
            <div class="avatar-card" onclick="saveAndStart('🕵️‍♂️')"><span class="avatar-emoji">🕵️‍♂️</span>Esploratore</div>
        </div>
    </div>

    <div id="app" class="hidden">
        <div id="display-avatar" style="font-size: 80px;"></div>
        <p id="status">Tocca per parlare</p>
        <button id="aria-btn">🎙️</button>
        <div id="transcript">Pronta! Prova a chiedermi qualcosa.</div>
        <div id="debug-log">Log di sistema...</div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:30px; background:none; border:none; color:#64748b; cursor:pointer; text-decoration:underline;">Reset totale</button>
    </div>

    <script>
        const systemPrompt = "Sei Aria, un'assistente vocale empatica esperta in pedagogia. Aiuti i bambini con i compiti. Non dare risposte pronte, usa il metodo socratico (fai domande). Sii incoraggiante.";

        function log(msg, isError = false) {
            const l = document.getElementById('debug-log');
            const colorClass = isError ? 'class="error-msg"' : '';
            l.innerHTML += `<div ${colorClass}>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function saveAndStart(emoji) {
            const key = document.getElementById('apiKey').value.trim();
            if(!key.startsWith('gsk_')) return alert("Chiave non valida!");
            localStorage.setItem('aria_key', key);
            localStorage.setItem('aria_avatar', emoji);
            init();
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-avatar').innerText = localStorage.getItem('aria_avatar');
            log("Aria pronta all'uso.");
        }

        // --- Logica Vocale ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            document.getElementById('aria-btn').onclick = () => {
                try { 
                    rec.start(); 
                    document.getElementById('aria-btn').classList.add('listening');
                    document.getElementById('status').innerText = "Ti ascolto...";
                } catch(e) { log("Errore microfono: " + e.message, true); }
            };

            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                const text = e.results[0][0].transcript;
                document.getElementById('transcript').innerText = "Tu: " + text;
                askGroq(text);
            };

            rec.onerror = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                log("Errore riconoscimento: " + e.error, true);
            };
        }

        async function askGroq(userInput) {
            const key = localStorage.getItem('aria_key');
            document.getElementById('status').innerText = "Aria sta pensando...";
            log("Chiamata a Groq...");

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + key,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userInput }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    log("ERRORE SERVER: " + (data.error ? data.error.message : "Sconosciuto"), true);
                    throw new Error("Errore " + response.status);
                }

                const reply = data.choices[0].message.content;
                document.getElementById('transcript').innerText = "Aria: " + reply;
                document.getElementById('status').innerText = "Tocca per parlare";
                log("Risposta ricevuta con successo.");

                // Voce
                const utter = new SpeechSynthesisUtterance(reply);
                utter.lang = 'it-IT';
                window.speechSynthesis.speak(utter);

            } catch(e) {
                log("ERRORE CRITICO: " + e.message, true);
                document.getElementById('status').innerText = "Errore. Controlla il log.";
            }
        }

        if(localStorage.getItem('aria_key')) init();
    </script>
</body>
</html>
