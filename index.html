<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Voce Ottimizzata</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        #app { text-align: center; width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        #aria-btn { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 50px; color: white; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); margin: 20px 0; }
        #aria-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #transcript { margin-top: 20px; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); min-height: 60px; line-height: 1.4; }
        .api-input { background: var(--card); border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Aria</h1>
        <p>Usa Microsoft Edge per una voce più umana</p>
        <input type="password" id="apiKey" class="api-input" placeholder="Chiave Groq...">
        <button onclick="saveAndStart()" style="padding: 10px 20px; border-radius: 10px; border: none; background: var(--accent); color: white; cursor: pointer;">Inizia</button>
    </div>

    <div id="app" class="hidden">
        <div id="avatar" style="font-size: 80px;">✨</div>
        <p id="status">Tocca per parlare</p>
        <button id="aria-btn">🎙️</button>
        <div id="transcript">Ciao! Come va la tua giornata?</div>
    </div>

    <script>
        const systemPrompt = "Sei Aria, un'amica empatica. Parla in modo naturale, dolce e breve. Usa espressioni come 'Capisco', 'Che bello', 'Mi dispiace'. Niente compiti, solo chiacchiere amichevoli.";

        function saveAndStart() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Inserisci la chiave!");
            localStorage.setItem('aria_key', key);
            init();
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            // Forza il caricamento delle voci
            window.speechSynthesis.getVoices();
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            document.getElementById('aria-btn').onclick = () => {
                window.speechSynthesis.cancel();
                rec.start();
                document.getElementById('aria-btn').classList.add('listening');
            };
            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                askGroq(e.results[0][0].transcript);
            };
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();

            // CERCA LE VOCI "NATURAL" DI MICROSOFT (Funzionano su Edge)
            const edgeVoice = voices.find(v => v.name.includes("Microsoft Elsa Online") || v.name.includes("Microsoft Isabella Online") || v.name.includes("Natural"));
            
            if (edgeVoice) {
                utter.voice = edgeVoice;
                console.log("Sto usando la voce premium: " + edgeVoice.name);
            }

            utter.lang = 'it-IT';
            utter.pitch = 1.0;
            utter.rate = 1.0; 
            
            synth.speak(utter);
        }

        async function askGroq(input) {
            document.getElementById('transcript').innerText = "Tu: " + input;
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + localStorage.getItem('aria_key'), "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: input }],
                        temperature: 0.9
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                document.getElementById('transcript').innerText = "Aria: " + reply;
                speak(reply);
            } catch(e) { console.error(e); }
        }

        if(localStorage.getItem('aria_key')) init();
    </script>
</body>
</html>
