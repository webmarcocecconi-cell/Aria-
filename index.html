<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARIA — Assistente Vocale (Free Tier)</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a; --surface: #161829; --card: #1e2035; --accent: #7c6dfa;
    --accent2: #f472b6; --accent3: #34d399; --text: #e8eaf6; --muted: #6b7280;
    --eye-white: #f0f4ff; --eye-iris: #7c6dfa; --eye-pupil: #0d0f1a;
    --border: rgba(124,109,250,0.2); --state-listening: #34d399;
    --state-thinking: #fbbf24; --state-speaking: #f472b6;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif;
    margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow-x: hidden;
  }
  .app-container { max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
  
  /* ARIA AVATAR */
  .avatar-container {
    display: flex; justify-content: center; align-items: center; padding: 40px 0;
    position: relative;
  }
  .svg-aria { width: 180px; height: 180px; filter: drop-shadow(0 0 15px rgba(124,109,250,0.3)); }
  
  /* STATUS BADGE */
  .status-badge {
    align-self: center; padding: 6px 16px; border-radius: 20px;
    font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: bold;
    text-transform: uppercase; border: 1px solid var(--border); transition: all 0.3s ease;
  }
  .status-idle { color: var(--muted); border-color: var(--muted); }
  .status-listening { color: var(--state-listening); border-color: var(--state-listening); box-shadow: 0 0 10px var(--state-listening); }
  .status-thinking { color: var(--state-thinking); border-color: var(--state-thinking); box-shadow: 0 0 10px var(--state-thinking); }
  .status-speaking { color: var(--state-speaking); border-color: var(--state-speaking); box-shadow: 0 0 10px var(--state-speaking); }

  /* CHAT AREA */
  .chat-box {
    background: var(--surface); border-radius: 24px; padding: 20px;
    height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    border: 1px solid var(--border); scroll-behavior: smooth;
  }
  .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
  .msg-user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg-aria { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  /* INPUTS */
  .controls { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 15px; padding: 12px 20px; color: white; outline: none;
  }
  .btn {
    width: 50px; height: 50px; border-radius: 15px; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: 0.2s; font-size: 1.2rem;
  }
  .btn-send { background: var(--accent); color: white; }
  .btn-mic { background: var(--accent2); color: white; }
  .btn:active { transform: scale(0.95); }

  /* SETTINGS */
  .settings-panel {
    margin-top: auto; padding: 15px; background: rgba(255,255,255,0.03);
    border-radius: 15px; font-size: 0.8rem;
  }
  .settings-panel input {
    width: 100%; background: #000; border: 1px solid var(--border);
    color: var(--accent3); padding: 8px; border-radius: 8px; margin-top: 5px;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="avatar-container">
    <svg class="svg-aria" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="var(--border)" stroke-width="0.5"/>
      <g id="eyesG">
        <g id="svgEyeL">
          <ellipse cx="35" cy="45" rx="10" ry="10" fill="var(--eye-white)" class="eye-bg"/>
          <circle cx="35" cy="45" r="5" fill="var(--eye-iris)"/>
          <circle cx="35" cy="45" r="2.5" fill="var(--eye-pupil)"/>
        </g>
        <g id="svgEyeR">
          <ellipse cx="65" cy="45" rx="10" ry="10" fill="var(--eye-white)" class="eye-bg"/>
          <circle cx="65" cy="45" r="5" fill="var(--eye-iris)"/>
          <circle cx="65" cy="45" r="2.5" fill="var(--eye-pupil)"/>
        </g>
      </g>
      <path id="mouth" d="M 40 65 Q 50 65 60 65" stroke="var(--eye-white)" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="statusBadge" class="status-badge status-idle">Pronta</div>

  <div class="chat-box" id="chatBox">
    <div class="msg msg-aria">Ciao! Sono ARIA. Ho attivato i miei motori gratuiti. Come posso aiutarti?</div>
  </div>

  <div class="controls">
    <input type="text" id="textInput" placeholder="Chiedimi qualcosa...">
    <button class="btn btn-send" onclick="handleSend()">&#10148;</button>
    <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
  </div>

  <div class="settings-panel">
    <strong>Configurazione Free:</strong><br>
    <small>Inserisci la tua API Key di Gemini (Google AI Studio)</small>
    <input type="password" id="geminiKey" placeholder="Incolla API Key qui...">
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const statusBadge = document.getElementById('statusBadge');
  const textInput = document.getElementById('textInput');
  const geminiKeyInput = document.getElementById('geminiKey');

  // --- 1. SINTESI VOCALE (GRATIS) ---
  function speak(text) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'it-IT';
    utterance.rate = 1.0;
    utterance.pitch = 1.1;

    utterance.onstart = () => updateUIState('speaking');
    utterance.onend = () => updateUIState('idle');
    
    window.speechSynthesis.speak(utterance);
  }

  // --- 2. RICONOSCIMENTO VOCALE (GRATIS) ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;
  let isListening = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;

    recognition.onstart = () => {
      updateUIState('listening');
      isListening = true;
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      processUserQuery(transcript);
    };

    recognition.onerror = () => updateUIState('idle');
    recognition.onend = () => { isListening = false; updateUIState('idle'); };
  }

  function toggleMic() {
    if (!recognition) return alert("Browser non supportato");
    if (isListening) recognition.stop();
    else recognition.start();
  }

  // --- 3. CERVELLO AI (GEMINI FREE) ---
  async function askGemini(query) {
    const key = geminiKeyInput.value.trim();
    if (!key) {
      addMessage('aria', "Per favore, inserisci la tua API Key di Google Gemini sotto.");
      return;
    }

    updateUIState('thinking');

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Sei ARIA, un'assistente vocale. Sii breve, amichevole e parla in italiano. Rispondi a: " + query }] }]
        })
      });

      const data = await response.json();
      const aiText = data.candidates[0].content.parts[0].text;
      
      addMessage('aria', aiText);
      speak(aiText);
    } catch (e) {
      addMessage('aria', "Errore di connessione. Controlla la chiave API.");
      updateUIState('idle');
    }
  }

  // --- LOGICA UI ---
  function handleSend() {
    const val = textInput.value.trim();
    if (val) {
      processUserQuery(val);
      textInput.value = '';
    }
  }

  function processUserQuery(text) {
    addMessage('user', text);
    askGemini(text);
  }

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = `msg msg-${sender}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function updateUIState(state) {
    statusBadge.className = `status-badge status-${state}`;
    statusBadge.textContent = state === 'idle' ? 'Pronta' : 
                             state === 'listening' ? 'Ascolto...' :
                             state === 'thinking' ? 'Rifletto...' : 'Parlo...';
    
    // Animazione bocca
    const mouth = document.getElementById('mouth');
    if (state === 'speaking') {
      mouth.setAttribute('d', 'M 40 65 Q 50 75 60 65'); // Sorriso aperto
    } else if (state === 'listening') {
      mouth.setAttribute('d', 'M 45 65 L 55 65'); // Bocca a linea
    } else {
      mouth.setAttribute('d', 'M 40 65 Q 50 67 60 65'); // Relax
    }
  }

  textInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>

</body>
</html>
