<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria - Amica Vera</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #app { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        #aria-btn { width: 140px; height: 140px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 60px; color: white; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); margin: 30px 0; transition: 0.3s; }
        #aria-btn.listening { background: #ef4444; transform: scale(1.1); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        #transcript { background: var(--card); padding: 25px; border-radius: 20px; min-height: 50px; line-height: 1.6; font-size: 1.1rem; border-bottom: 4px solid var(--accent); }
        .api-input { background: var(--card); border: 2px solid #334155; color: white; padding: 15px; border-radius: 15px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="setup">
        <div style="font-size: 80px;">✨</div>
        <h1>Ciao, sono Aria</h1>
        <p>Inserisci la tua chiave per iniziare</p>
        <input type="password" id="apiKey" class="api-input" placeholder="gsk_...">
        <button onclick="saveAndStart()" style="background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%;">ENTRA</button>
    </div>

    <div id="app" class="hidden">
        <div id="avatar-display" style="font-size: 100px;">✨</div>
        <p id="status" style="color: #94a3b8; font-weight: 500;">Tocca Aria per parlare</p>
        <button id="aria-btn">🎙️</button>
        <div id="transcript">Ehi! Come stai? Mi fa piacere sentirti!</div>
        <p onclick="localStorage.clear(); location.reload();" style="margin-top: 40px; font-size: 0.8rem; color: #64748b; cursor: pointer; text-decoration: underline;">Reset Chiave</p>
    </div>

    <script>
        const systemPrompt = "Sei Aria, un'amica empatica e solare. Parla in modo sintetico, massimo due frasi per risposta. Sii calda e usa un linguaggio da amica: 'Ma dai!', 'Ti capisco', 'Che bello!'. NON parlare di studio o compiti. Se l'utente ti fa una domanda, rispondi e rilancia con una domanda curiosa su di lui.";

        function saveAndStart() {
            const key = document.getElementById('apiKey').value.trim();
            if(key) {
                localStorage.setItem('aria_key', key);
                init();
            }
        }

        function init() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            // Caricamento forzato voci
            speechSynthesis.getVoices();
        }

        // --- VOCE (Tentativo di umanizzazione estrema) ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();

            // Cerchiamo ossessivamente una voce "Natural" o "Online" (le migliori)
            const premiumVoice = voices.find(v => v.lang.startsWith('it') && (v.name.includes('Online') || v.name.includes('Natural') || v.name.includes('Google')));
            
            if (premiumVoice) utter.voice = premiumVoice;
            
            utter.lang = 'it-IT';
            utter.pitch = 1.0; 
            utter.rate = 1.0; // Velocità standard per stabilità
            
            window.speechSynthesis.speak(utter);
        }

        // --- ASCOLTO ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech();
            rec.lang = 'it-IT';
            
            document.getElementById('aria-btn').onclick = () => {
                try {
                    rec.start();
                    document.getElementById('aria-btn').classList.add('listening');
                    document.getElementById('status').innerText = "Ti sto ascoltando...";
                } catch(e) { console.log(e); }
            };

            rec.onresult = (e) => {
                document.getElementById('aria-btn').classList.remove('listening');
                const text = e.results[0][0].transcript;
                document.getElementById('transcript').innerText = "Tu: " + text;
                askGroq(text);
            };
        }

        async function askGroq(input) {
            document.getElementById('status').innerText = "Aria sta pensando...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + localStorage.getItem('aria_key'),
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: input }],
                        temperature: 0.9
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                document.getElementById('transcript').innerText = reply;
                document.getElementById('status').innerText = "Tocca per rispondere";
                speak(reply);
            } catch(e) { 
                document.getElementById('status').innerText = "Errore di connessione!";
            }
        }

        if(localStorage.getItem('aria_key')) init();
        // Listener per caricare le voci su alcuni browser
        window.speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    </script>
</body>
</html>
